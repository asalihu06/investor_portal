{% extends 'base.html' %}
{% block title %}Reset Password — Enigma Investor Portal{% endblock %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center">
    <div class="bg-white rounded-2xl shadow-lg p-10 w-full max-w-md">
        <div class="text-center mb-8">
            <div class="bg-green-100 rounded-full w-16 h-16 flex items-center justify-center mx-auto mb-4">
                <svg class="w-8 h-8 text-[#1a3a28]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/>
                </svg>
            </div>
            <h2 class="text-2xl font-bold text-[#0f2419]">Forgot Password?</h2>
            <p class="text-gray-500 text-sm mt-2">Enter your email and we'll send you a reset link</p>
        </div>

        <form method="POST">
            {% csrf_token %}
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
                <input type="email" name="email" required autofocus
                    class="w-full border border-gray-300 rounded-lg px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-[#e6b84a]"
                    placeholder="your@email.com">
            </div>
            <button type="submit"
                class="w-full bg-[#1a3a28] text-white py-3 rounded-full font-semibold hover:bg-[#0f2419] transition">
                Send Reset Link
            </button>
        </form>

        <div class="text-center mt-6">
            <a href="{% url 'login_choice' %}" class="text-sm text-[#1a3a28] hover:underline">← Back to Login</a>
        </div>
    </div>
</div>
{% endblock %}
