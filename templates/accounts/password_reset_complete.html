{% extends 'base.html' %}
{% block title %}Password Reset Complete — Enigma Investor Portal{% endblock %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center">
    <div class="bg-white rounded-2xl shadow-lg p-10 w-full max-w-md text-center">
        <div class="bg-green-100 rounded-full w-16 h-16 flex items-center justify-center mx-auto mb-6">
            <svg class="w-8 h-8 text-[#1a3a28]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
        </div>
        <h2 class="text-2xl font-bold text-[#0f2419] mb-2">Password Reset Complete</h2>
        <p class="text-gray-500 text-sm mb-8">Your password has been successfully updated. You can now log in with your new password.</p>
        <a href="{% url 'login_choice' %}"
            class="inline-block bg-[#1a3a28] text-white px-8 py-3 rounded-full font-semibold hover:bg-[#0f2419] transition">
            Go to Login
        </a>
    </div>
</div>
{% endblock %}
