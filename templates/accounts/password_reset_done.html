{% extends 'base.html' %}
{% block title %}Reset Link Sent — Enigma Investor Portal{% endblock %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center">
    <div class="bg-white rounded-2xl shadow-lg p-10 w-full max-w-md text-center">
        <div class="bg-green-100 rounded-full w-16 h-16 flex items-center justify-center mx-auto mb-6">
            <svg class="w-8 h-8 text-[#1a3a28]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
            </svg>
        </div>
        <h2 class="text-2xl font-bold text-[#0f2419] mb-2">Check Your Terminal</h2>
        <p class="text-gray-500 text-sm mb-8">
            Since this is running locally, the reset link has been printed to your terminal window. Copy and paste it into your browser.
        </p>
        <a href="{% url 'login_choice' %}"
            class="inline-block bg-[#1a3a28] text-white px-8 py-3 rounded-full font-semibold hover:bg-[#0f2419] transition">
            Back to Login
        </a>
    </div>
</div>
{% endblock %}
