{% extends 'base.html' %}
{% block title %}Edit Hirer &dash; {{ allocation.asset.name }}{% endblock %}

{% block dashboard_content %}
<div class="max-w-lg mx-auto">
    <div class="mb-8 flex justify-between items-center">
        <div>
            <h1 class="text-2xl font-bold text-[#0f2419]">Edit Hirer</h1>
            <p class="text-gray-500 mt-1 text-sm">{{ allocation.asset.name }} &dot; {{ allocation.asset.asset_code }}</p>
        </div>
        <a href="{% url 'manage_investment' investment.pk %}"
            class="bg-gray-100 text-gray-700 px-6 py-3 rounded-full font-medium hover:bg-gray-200 transition text-sm">
            &lAarr; Back
        </a>
    </div>

    <div class="bg-white rounded-2xl shadow p-8">
        <form method="POST">
            {% csrf_token %}
            <div class="mb-5">
                <label class="block text-sm font-medium text-gray-700 mb-1">Hirer Name</label>
                <input type="text" name="hirer_name"
                    value="{{ allocation.hirer_name }}"
                    placeholder="e.g. Musa Jikan"
                    class="w-full border border-gray-300 rounded-lg px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-[#e6b84a]">
            </div>
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-1">Hirer Phone</label>
                <input type="text" name="hirer_phone"
                    value="{{ allocation.hirer_phone }}"
                    placeholder="e.g. 08012345678"
                    class="w-full border border-gray-300 rounded-lg px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-[#e6b84a]">
            </div>
            <div class="flex gap-4">
                <button type="submit"
                    class="flex-1 text-white py-3 rounded-full font-semibold text-sm"
                    style="background:#1a3a28;">
                    Save Changes
                </button>
                <a href="{% url 'manage_investment' investment.pk %}"
                    class="flex-1 text-center bg-gray-100 text-gray-700 py-3 rounded-full font-semibold text-sm hover:bg-gray-200 transition">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
